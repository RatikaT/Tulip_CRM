  <ellipse cx="15" cy="34" rx="12" ry="16" fill="#7B4B94"/>

  <!-- Baby figure (pink/coral) -->
  <ellipse cx="33" cy="20" rx="7" ry="7" fill="#E84A8A"/>
  <ellipse cx="35" cy="36" rx="9" ry="12" fill="#E84A8A"/>

  <!-- LIP text -->
  <text x="52" y="40" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="bold" fill="#7B4B94">LIP</text>
</svg>
