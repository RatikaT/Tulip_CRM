services:
  - type: web
    name: tulip-crm-backend
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: FRONTEND_URL
        sync: false
      - key: LOG_LEVEL
        value: INFO
      # Required by config.py - the app will not start without these
      - key: DEFAULT_ADMIN_PASSWORD
        sync: false
      - key: DEFAULT_SUPER_ADMIN_PASSWORD
        sync: false
